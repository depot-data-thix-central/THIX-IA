name: thix_ia
description: "THIX - Mon intelligence artificielle personnelle"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # API calls
  http: ^1.2.1
  dio: ^5.4.0

  # Local storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.2

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/prompts/

  # Polices (optionnel)
  # fonts:
  #   - family: ThixFont
  #     fonts:
  #       - asset: assets/fonts/ThixFont-Regular.ttf
